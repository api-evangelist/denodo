aid: denodo
name: Denodo
description: >-
  Denodo is a leading data virtualization platform that enables real-time access,
  integration, and delivery of data from disparate sources across enterprise data
  landscapes. The Denodo Platform exposes a portfolio of REST, OData, GraphQL, and
  SOAP web service endpoints through Virtual DataPort, the Data Catalog, the Solution
  Manager, and the Scheduler so that data products can be published, governed, and
  administered programmatically.
type: Index
image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
- Data Catalog
- Data Fabric
- Data Mesh
- Data Virtualization
- GraphQL
- Logical Data Warehouse
- OData
- REST
- Scheduler
- Solution Manager
