apis:
- aid: denodo:solution-manager-api
  name: Denodo Solution Manager REST API
  description: >-
    The Solution Manager REST API provides programmatic access to administer the
    Denodo Platform across environments and clusters. It exposes endpoints for
    cluster lifecycle management, environment configuration, deployment of revisions
    across servers (VDP, SCHEDULER, VDP_DATA_CATALOG), monitoring, license management,
    and permissions administration. Most operations require HTTP Basic authentication
    or token-based authentication.
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  humanURL: https://community.denodo.com/docs/html/browse/latest/en/solution_manager/administration/appendix/rest_api/rest_api
  baseURL: https://solution-manager.example.com/solution-manager
  tags:
  - Administration
  - Clusters
  - Deployment
  - Environments
  - Solution Manager
  properties:
  - type: Documentation
    url: https://community.denodo.com/docs/html/browse/latest/en/solution_manager/administration/appendix/rest_api/rest_api
  - type: Reference
    url: https://community.denodo.com/docs/html/browse/9.4/en/solution_manager/administration/appendix/rest_api/rest_api
  contact:
  - FN: Denodo Support
    email: support@denodo.com
    url: https://support.denodo.com
- aid: denodo:data-catalog-api
  name: Denodo Data Catalog REST API
  description: >-
    The Denodo Data Catalog REST API provides programmatic access to the catalog
    of virtual views, web services, search, lineage, tags, categories, and
    certifications managed by the Denodo Platform. It powers metadata exploration,
    data product publishing, and governance workflows. Interactive documentation
    is available via Swagger at /denodo-data-catalog/swagger-ui/index.html.
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  humanURL: https://community.denodo.com/docs/html/browse/latest/en/vdp/data_catalog/appendix/rest_api/rest_api
  baseURL: https://denodo.example.com/denodo-data-catalog
  tags:
  - Catalog
  - Data Catalog
  - Governance
  - Metadata
  - Search
  properties:
  - type: Documentation
    url: https://community.denodo.com/docs/html/browse/latest/en/vdp/data_catalog/appendix/rest_api/rest_api
  - type: Swagger
    url: https://community.denodo.com/docs/html/browse/9.0/en/vdp/data_catalog/appendix/rest_api/rest_api
  contact:
  - FN: Denodo Support
    email: support@denodo.com
    url: https://support.denodo.com
- aid: denodo:rest-web-service
  name: Denodo RESTful Web Service
  description: >-
    The Denodo RESTful Web Service exposes any view in Virtual DataPort as a
    resource-oriented REST endpoint. It supports JSON, XML, and HTML
    representations, query filtering, projection, pagination, and HATEOAS
    navigation between associated views. The same RESTful approach is used to
    publish custom REST Web services declared via VQL.
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  humanURL: https://community.denodo.com/docs/html/browse/latest/en/vdp/administration/restful_architecture/restful_architecture
  baseURL: https://denodo.example.com/denodo-restfulws
  tags:
  - HATEOAS
  - REST
  - Virtual DataPort
  - Web Services
  properties:
  - type: Documentation
    url: https://community.denodo.com/docs/html/browse/latest/en/vdp/administration/restful_architecture/restful_architecture
  - type: Tutorial
    url: https://community.denodo.com/tutorials/browse/dataservices/2rest
  contact:
  - FN: Denodo Support
    email: support@denodo.com
    url: https://support.denodo.com
- aid: denodo:odata-service
  name: Denodo OData 4.0 Service
  description: >-
    The Denodo OData 4.0 service provides an OASIS OData v4 compliant
    interface for querying Virtual DataPort views over HTTP. It supports
    filter, select, expand, orderby, top, and skip query options as well as
    service metadata documents and entity navigation between related views.
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  humanURL: https://community.denodo.com/docs/html/browse/latest/en/vdp/administration/restful_architecture/odata_4_service/odata_4_service
  baseURL: https://denodo.example.com/denodo-odata4-service
  tags:
  - OData
  - Query
  - REST
  - Virtual DataPort
  properties:
  - type: Documentation
    url: https://community.denodo.com/docs/html/browse/latest/en/vdp/administration/restful_architecture/odata_4_service/odata_4_service
  contact:
  - FN: Denodo Support
    email: support@denodo.com
    url: https://support.denodo.com
- aid: denodo:graphql-service
  name: Denodo GraphQL Service
  description: >-
    The Denodo GraphQL Service enables clients to execute GraphQL queries
    against virtual views in the Denodo Platform. It generates a GraphQL
    schema from selected views and supports filtering, pagination, and field
    selection through standard GraphQL syntax over HTTP.
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  humanURL: https://community.denodo.com/docs/html/browse/latest/en/vdp/administration/restful_architecture/graphql_service/graphql_service
  baseURL: https://denodo.example.com/denodo-graphql-service
  tags:
  - GraphQL
  - Query
  - Virtual DataPort
  properties:
  - type: Documentation
    url: https://community.denodo.com/docs/html/browse/latest/en/vdp/administration/restful_architecture/graphql_service/graphql_service
  - url: graphql/denodo-graphql.md
    type: GraphQL
  contact:
  - FN: Denodo Support
    email: support@denodo.com
    url: https://support.denodo.com
- aid: denodo:scheduler-rest-api
  name: Denodo Scheduler REST API
  description: >-
    The Denodo Scheduler REST API allows programmatic management and
    monitoring of scheduled jobs and projects in the Denodo Scheduler
    component. Endpoints support listing, creating, executing, cancelling
    jobs and retrieving their status, history, and configuration.
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
  humanURL: https://community.denodo.com/docs/html/browse/latest/en/scheduler/administration/scheduler_rest_web_service/scheduler_rest_web_service
  baseURL: https://denodo.example.com/webadmin/denodo-scheduler-admin
  tags:
  - Jobs
  - Scheduler
  - Workflow
  properties:
